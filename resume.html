
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futuristic Resume | AI Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050816;
      --panel: rgba(15, 23, 42, 0.78);
      --panel2: rgba(255,255,255,0.04);
      --primary: #00e5ff;
      --secondary: #8b5cf6;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,229,255,0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.15), transparent 28%),
        #050816;
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 100%);
      pointer-events: none;
    }

    .wrapper {
      width: min(1200px, 92%);
      margin: 40px auto;
      position: relative;
      z-index: 2;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      margin-bottom: 28px;
    }

    .glass {
      background: var(--panel);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 30px;
      box-shadow:
        0 0 40px rgba(0,229,255,0.08),
        0 0 100px rgba(139,92,246,0.05);
      position: relative;
      overflow: hidden;
    }

    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
      pointer-events: none;
    }

    .eyebrow {
      color: var(--primary);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.75rem;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.7rem, 6vw, 5rem);
      line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(to right, white, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .summary {
      color: var(--muted);
      line-height: 1.9;
      font-size: 1rem;
      max-width: 90%;
    }

    .contact-grid {
      display: grid;
      gap: 14px;
    }

    .contact-card {
      background: var(--panel2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 16px;
    }

    .contact-label {
      color: var(--primary);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .contact-value {
      color: white;
      font-size: 0.95rem;
    }

    .main {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 28px;
    }

    .section {
      margin-bottom: 28px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
    }

    .section-title::before {
      content: "";
      width: 24px;
      height: 2px;
      background: linear-gradient(to right, var(--primary), transparent);
    }

    .skill {
      margin-bottom: 18px;
    }

    .skill-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.92rem;
    }

    .skill-bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .skill-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(to right, #00e5ff, #8b5cf6);
      box-shadow: 0 0 20px rgba(0,229,255,0.4);
    }

    .timeline {
      position: relative;
      padding-left: 24px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(#00e5ff, transparent);
    }

    .timeline-item {
      position: relative;
      padding: 22px;
      border-radius: 22px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00e5ff;
      left: -25px;
      top: 28px;
      box-shadow: 0 0 20px #00e5ff;
    }

    .role {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .company {
      color: var(--primary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .date {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 12px;
    }

    .desc {
      color: var(--muted);
      line-height: 1.7;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.15);
      font-size: 0.82rem;
    }

    .project {
      padding: 22px;
      border-radius: 22px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 18px;
      transition: 0.35s ease;
    }

    .project:hover {
      transform: translateY(-6px);
      border-color: rgba(0,229,255,0.3);
    }

    .project-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .project-desc {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .project-stack {
      color: var(--primary);
      font-size: 0.85rem;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 920px) {
      .hero,
      .main {
        grid-template-columns: 1fr;
      }

      .summary {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="wrapper" id="app"></div>

<script>
  const profile = {
    name: "YOUR NAME",

    title: "AI Engineer • Product Builder • Full Stack Developer",

    summary:
      "AI-focused builder passionate about designing futuristic digital experiences, scalable software systems, automation workflows, and modern product ecosystems. Strong focus on combining engineering, design, and emerging AI technologies to create ambitious user-first products.",

    contact: {
      Location: "Haryana, India",
      Email: "your@email.com",
      GitHub: "github.com/yourhandle",
      LinkedIn: "linkedin.com/in/yourprofile",
      Portfolio: "yourwebsite.com"
    },

    skills: [
      { name: "AI Systems & Automation", level: 92 },
      { name: "JavaScript / TypeScript", level: 94 },
      { name: "React / Next.js", level: 91 },
      { name: "Backend Architecture", level: 86 },
      { name: "UI / UX Engineering", level: 84 },
      { name: "Product Strategy", level: 82 }
    ],

    experience: [
      {
        role: "Independent AI Product Builder",
        company: "Self-Directed Projects",
        date: "2023 — Present",
        desc:
          "Building AI-first applications, automation systems, intelligent workflows, and futuristic user interfaces. Focused on rapid product iteration, scalable architecture, and integrating modern AI APIs into production-grade experiences."
      },
      {
        role: "Full Stack Developer",
        company: "Modern Web & SaaS Projects",
        date: "2022 — Present",
        desc:
          "Developed high-performance full-stack web applications using React, Next.js, Node.js, cloud services, and API orchestration. Prioritized speed, usability, and elegant engineering systems."
      }
    ],

    projects: [
      {
        title: "AI Workspace Ecosystem",
        desc:
          "Designed a futuristic AI productivity workspace integrating conversational interfaces, memory systems, automation pipelines, and modular productivity tooling.",
        stack: "OpenAI APIs • React • Node.js • Vector Search"
      },
      {
        title: "Realtime Intelligence Dashboard",
        desc:
          "Built a modern analytics dashboard with live data visualization, streaming APIs, and interactive UI systems optimized for performance and responsiveness.",
        stack: "Next.js • Realtime APIs • PostgreSQL"
      },
      {
        title: "Automation & Workflow Systems",
        desc:
          "Created intelligent workflow systems that automate repetitive operations, improve execution speed, and streamline product operations.",
        stack: "JavaScript • Python • Cloud Functions"
      }
    ],

    technologies: [
      "React",
      "Next.js",
      "Node.js",
      "TypeScript",
      "Python",
      "OpenAI APIs",
      "PostgreSQL",
      "Docker",
      "AWS",
      "TailwindCSS",
      "Figma",
      "Git"
    ]
  };

  const app = document.getElementById('app');

  app.innerHTML = `

    <section class="hero">

      <div class="glass">
        <div class="eyebrow">Future Resume Interface</div>
        <div class="name">${profile.name}</div>
        <div class="title">${profile.title}</div>
        <div class="summary">${profile.summary}</div>
      </div>

      <div class="glass">
        <div class="section-title">Contact</div>

        <div class="contact-grid">
          ${Object.entries(profile.contact)
            .map(
              ([key, value]) => `
                <div class="contact-card">
                  <div class="contact-label">${key}</div>
                  <div class="contact-value">${value}</div>
                </div>
              `
            )
            .join('')}
        </div>
      </div>

    </section>

    <section class="main">

      <div>

        <div class="glass section">
          <div class="section-title">Core Skills</div>

          ${profile.skills
            .map(
              skill => `
                <div class="skill">
                  <div class="skill-head">
                    <span>${skill.name}</span>
                    <span>${skill.level}%</span>
                  </div>

                  <div class="skill-bar">
                    <div class="skill-fill" style="width:${skill.level}%"></div>
                  </div>
                </div>
              `
            )
            .join('')}
        </div>

        <div class="glass section">
          <div class="section-title">Tech Arsenal</div>

          <div class="tags">
            ${profile.technologies
              .map(tech => `<div class="tag">${tech}</div>`)
              .join('')}
          </div>
        </div>

      </div>

      <div>

        <div class="glass section">
          <div class="section-title">Experience</div>

          <div class="timeline">
            ${profile.experience
              .map(
                item => `
                  <div class="timeline-item">
                    <div class="role">${item.role}</div>
                    <div class="company">${item.company}</div>
                    <div class="date">${item.date}</div>
                    <div class="desc">${item.desc}</div>
                  </div>
                `
              )
              .join('')}
          </div>
        </div>

        <div class="glass section">
          <div class="section-title">Highlighted Projects</div>

          ${profile.projects
            .map(
              project => `
                <div class="project">
                  <div class="project-title">${project.title}</div>
                  <div class="project-desc">${project.desc}</div>
                  <div class="project-stack">${project.stack}</div>
                </div>
              `
            )
            .join('')}
        </div>

      </div>

    </section>

    <div class="footer">
      Designed with futuristic glassmorphism + cyberpunk inspired UI.
    </div>
  `;

  // Neon hover interaction
  document.querySelectorAll('.glass').forEach(card => {
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      card.style.background = `
        radial-gradient(circle at ${x}px ${y}px,
        rgba(0,229,255,0.12),
        rgba(15,23,42,0.78) 40%)`;
    });

    card.addEventListener('mouseleave', () => {
      card.style.background = 'rgba(15, 23, 42, 0.78)';
    });
  });
</script>

</body>
</html>
```

Replace:

* YOUR NAME
* email
* links

Everything else is already tailored toward an AI-focused product engineer / futuristic builder profile.
