<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Futuristic Resume</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050816;
      --card: rgba(15, 23, 42, 0.75);
      --glass: rgba(255,255,255,0.06);
      --primary: #00e5ff;
      --secondary: #8b5cf6;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.12);
      --glow: 0 0 30px rgba(0,229,255,0.25);
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,229,255,0.15), transparent 25%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.15), transparent 25%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: min(1200px, 92%);
      margin: 50px auto;
      position: relative;
      z-index: 2;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--glow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
      pointer-events: none;
    }

    .name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.6rem, 5vw, 4.5rem);
      line-height: 1;
      margin-bottom: 12px;
      background: linear-gradient(to right, #ffffff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .role {
      color: var(--primary);
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
      font-weight: 600;
    }

    .summary {
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
      max-width: 90%;
    }

    .contact-grid {
      display: grid;
      gap: 14px;
    }

    .contact-item {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .label {
      color: var(--primary);
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .value {
      font-size: 0.95rem;
      color: var(--text);
      word-break: break-word;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 30px;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      letter-spacing: 2px;
      margin-bottom: 22px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: "";
      width: 28px;
      height: 2px;
      background: linear-gradient(to right, var(--primary), transparent);
    }

    .skill {
      margin-bottom: 18px;
    }

    .skill-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
      position: relative;
    }

    .fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      box-shadow: 0 0 20px rgba(0,229,255,0.5);
    }

    .timeline {
      position: relative;
      padding-left: 26px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(var(--primary), transparent);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 28px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -26px;
      top: 24px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary);
    }
